<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeServices | Servicios para tu escalabilidad digital</title>
  <meta name="description" content="BeServices transforma empresas con Microsoft 365, Google Workspace, ciberseguridad gestionada y soporte IT gestionado.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="bee.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; color: #1a202c; background: #fff; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(5,11,26, 0.95); backdrop-filter: blur(8px);
      padding: 1rem 2rem; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    nav .container { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { color: white; font-size: 1.5rem; font-weight: 800; }
    nav .menu { display: flex; gap: 2rem; flex: 1; margin-left: 3rem; }
    nav .menu a { color: #e2e8f0; font-size: 0.95rem; text-decoration: none; transition: opacity .2s; }
    nav .menu a:hover { opacity: 0.7; }
    nav .right { display: flex; gap: 1.5rem; align-items: center; }
    nav .location { color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    nav .btn { background: transparent; border: 1.5px solid #0075F2; color: white; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all .2s; }
    nav .btn:hover { background: #0075F2; }

    @media (max-width: 768px) {
      nav .menu { display: none; }
      nav .location { display: none; }
    }

    /* HERO */
    .hero {
      position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #030B1C 0%, #0A1628 100%);
      background-image: url('assets/hero.jpeg');
      background-size: cover; background-position: center 40%;
      overflow: hidden; margin-top: 60px;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(3,11,28,0.4) 0%, rgba(3,11,28,0.65) 50%, rgba(3,11,28,0.9) 100%);
      z-index: 1;
    }
    .hero-content { position: relative; z-index: 2; text-align: center; color: white; max-width: 800px; padding: 2rem; }
    .hero-content h1 {
      font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900; line-height: 1.1;
      margin-bottom: 1rem;
    }
    .hero-line { height: 4px; width: 80px; background: #0075F2; margin: 1.5rem auto 2rem; border-radius: 2px; }
    .hero-content p { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 2rem; line-height: 1.6; }
    .hero-cta {
      display: inline-block; padding: 0.9rem 2rem; border: 2px solid white; color: white;
      text-decoration: none; border-radius: 8px; font-weight: 600; transition: all .3s;
      cursor: pointer; background: transparent;
    }
    .hero-cta:hover { background: white; color: #030B1C; }

    @media (max-width: 768px) {
      .hero { min-height: 80vh; }
      .hero-content h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="container">
    <div class="logo">BeServices</div>
    <div class="menu">
      <a href="#servicios">Servicios</a>
      <a href="#sectores">Sectores</a>
      <a href="#casos">Casos de éxito</a>
      <a href="#recursos">Recursos</a>
      <a href="#nosotros">Sobre nosotros</a>
    </div>
    <div class="right">
      <div class="location">📍 Barcelona</div>
      <button class="btn">Hablemos →</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Servicios para tu<br><span style="color: #0075F2;">escalabilidad digital</span></h1>
    <div class="hero-line"></div>
    <p>Transformamos empresas con Microsoft 365, Google Workspace, ciberseguridad gestionada y soporte IT continuo. Partner certificado Microsoft y Google.</p>
    <button class="hero-cta" onclick="document.getElementById('servicios').scrollIntoView({behavior:'smooth'})">
      Descubre nuestros servicios →
    </button>
  </div>
</section>

<!-- RESTO DEL CONTENIDO VIENE EN FASE 2-4 -->

</body>
</html>
